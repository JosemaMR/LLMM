<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Marvel Quiz</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- PANTALLA INICIAL -->

        <div id="start-screen">

            <h1>MARVEL QUIZ</h1>
            <p>Idioma/Languaje</p>

            <button onclick="startQuiz('preguntas_es.xml')">
                Español
            </button>

            <button onclick="startQuiz('preguntas_en.xml')">
                English
            </button>

        </div>

        <!-- QUIZ -->

        <div id="quiz-screen" style="display:none;">

            <div class="info">

                <p>
                    ⏱ Time:
                    <span id="timer">0</span>
                </p>

                <p>
                    ⭐ Score:
                    <span id="score">0</span>
                </p>

            </div>

            <h2 id="question"></h2>

            <img id="question-image">

            <div id="answers"></div>

            <button id="nextBtn">
                ->
            </button>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
