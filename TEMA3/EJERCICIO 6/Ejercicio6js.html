<!DOCTYPE html>
<html>
<head>
    <title>Citas de superhéroes</title>

    <style>
        .max-height {
            min-height: 100vh;
        }

        body {
            background: #b09e99;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quote-container {
            background: rgba(255, 255, 255, 0.5);
            padding: 2rem;
            text-align: center;
            border-radius: 10px;
            width: 400px;
        }

        #generate-btn {
            color: white;
            background: #64b6ac;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0.5rem 1rem;
        }

        #generate-btn:hover {
            background: #b09e99;
            color: #333333;
        }

        .author {
            color: #64b6ac;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body class="max-height">

<div class="quote-container">
    <h2>Citas de superhéroes</h2>

    <p id="quote">Pulsa el botón para ver una frase</p>
    <p class="author"></p>

    <button id="generate-btn" onclick="generarFrase()">Nueva frase</button>
</div>

<script>
    const quotes = [
        {
            quote: "Un gran poder conlleva una gran responsabilidad",
            author: "Peter Parker, Spiderman"
        },
        {
            quote: "En el día más brillante, en la noche más oscura, el mal nunca escapará a mi vista",
            author: "Hal Jordan, Green Lantern"
        },
        {
            quote: "Los sueños nos salvan. Los sueños nos elevan y nos transforman",
            author: "Clark Kent, Superman"
        },
        {
            quote: "Si no puedes proteger la Tierra, puedes estar seguro de que la vengaré",
            author: "Tony Stark, Iron Man"
        },
        {
            quote: "El precio de la libertad es alto. Siempre lo ha sido",
            author: "Steve Rogers, Capitán América"
        },
        {
            quote: "No es quién soy por dentro, sino lo que hago lo que me define",
            author: "Bruce Wayne, Batman"
        }
    ];

    function generarFrase() {
        let random = Math.floor(Math.random() * quotes.length);

        document.getElementById("quote").textContent = quotes[random].quote;
        document.querySelector(".author").textContent = quotes[random].author;
    }
</script>

</body>
</html>
