<!DOCTYPE html>
<html>
<head>
    <title>setTimeout</title>
    <script>
        function mostrarMensaje() {
            alert("Han pasado 5 segundos");
        }
        window.onload = function() {
            setTimeout(mostrarMensaje, 5000);
        }
    </script>
</head>
<body>
    <h2>Página con mensaje en espera</h2>
    <p>Espera un momento...</p>
</body>
</html>
